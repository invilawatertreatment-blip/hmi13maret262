    // Bagian update logoGrid di dalam window.onload

        // Data mitra: Tambahkan URL gambar asli pada properti img
        const mitraData = [
            { name: "Cemerlang", img: "https://placehold.co/200x120/white/000?text=Cemerlang" },
            { name: "Kievit", img: "https://placehold.co/200x120/white/000?text=Kievit" },
            { name: "KIW", img: "https://placehold.co/200x120/white/000?text=KIW" },

            { name: "Tirta Asasta", img: "https://placehold.co/200x120/white/000?text=Tirta+Asasta" },
            { name: "Tirtanadi", img: "https://placehold.co/200x120/white/000?text=Tirtanadi" },
            { name: "United Tractors", img: "https://placehold.co/200x120/white/000?text=United+Tractors" },
            { name: "Wika", img: "https://placehold.co/200x120/white/000?text=Wika" }

        lGrid.innerHTML = mitraData.map(m => `
            <div class="bg-white rounded-xl p-4 flex items-center justify-center shadow-sm hover:shadow-md transition-shadow h-24 sm:h-28 overflow-hidden group">
                <img src="${m.img}" alt="${m.name}" class="max-w-full max-h-full object-contain grayscale group-hover:grayscale-0 transition-all duration-300">

        `).join('');
